<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberShop | Agendamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Vintage <span>BarberShop</span></h1>
            <p>Escolha o seu estilo e reserve seu horário</p>
        </header>

        <main class="booking-card">
            <section class="services">
                <h3>1. Selecione o Serviço</h3>
                <div class="options">
                    <label class="option-item">
                        <input type="radio" name="service" value="cabelo" checked>
                        <div class="card-content">
                            <span>Corte de Cabelo</span>
                            <small>R$ 45,00</small>
                        </div>
                    </label>
                    <label class="option-item">
                        <input type="radio" name="service" value="barba">
                        <div class="card-content">
                            <span>Barba Completa</span>
                            <small>R$ 35,00</small>
                        </div>
                    </label>
                    <label class="option-item">
                        <input type="radio" name="service" value="combo">
                        <div class="card-content">
                            <span>Combo (Cabelo + Barba)</span>
                            <small>R$ 100,00</small>
                        </div>
                    </label>
                </div>
            </section>

            <section class="datetime">
                <h3>2. Data e Hora</h3>
                <div class="inputs">
                    <input type="date" id="date">
                    <select id="time">
                        <option value="09:00">09:00</option>
                        <option value="10:00">10:00</option>
                        <option value="14:00">14:00</option>
                        <option value="16:00">16:00</option>
                        <option value="17:00">17:30</option>
                        <option value="18:00">18:00</option>
                         <option value="19:00">19:00</option>
                          <option value="20:00">20:00</option>
                           <option value="21:00">21:00</option>
                    </select>
                </div>
            </section>

            <section class="client-info">
                <h3>3. Seus Dados</h3>
                <input type="text" placeholder="Seu Nome Completo">
                <input type="tel" placeholder="(00) 00000-0000">
                <button type="submit" class="btn-confirm">Confirmar Agendamento</button>
            </section>
        </main>
    </div>
</body>
</html>
