<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gerenciar Serviços</title>
    <style>
        :root {
            --primary: #121212;
            --secondary: #d4af37;
            --bg: #121212;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #f4f4f5;
            --muted: #cbd5e1;
            --danger: #dc3545;
            --success: #28a745;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.03);
            padding: 24px;
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 18px 60px rgba(0,0,0,0.18);
        }

        h1, h2 {
            color: var(--text);
            margin-top: 0;
        }

        a {
            color: var(--secondary);
            text-decoration: none;
        }

        .form-group {
            margin: 18px 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--text);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            box-sizing: border-box;
        }

        input::placeholder, select option {
            color: var(--muted);
        }

        button {
            padding: 12px 20px;
            background: var(--secondary);
            color: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: opacity 0.2s ease;
        }

        button:hover {
            opacity: 0.92;
        }

        button.delete {
            background: var(--danger);
            color: white;
        }

        button.delete:hover {
            opacity: 0.92;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: transparent;
        }

        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        th {
            background: rgba(255,255,255,0.05);
            font-weight: 700;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .message {
            padding: 14px;
            margin: 15px 0;
            border-radius: 12px;
        }

        .success {
            background: rgba(40, 167, 69, 0.12);
            color: #b7f5cf;
            border: 1px solid rgba(40, 167, 69, 0.35);
        }

        .error {
            background: rgba(220, 53, 69, 0.12);
            color: #ffd7df;
            border: 1px solid rgba(220, 53, 69, 0.35);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Gerenciar Serviços</h1>
        <a href="../dashboard.php" style="text-decoration: none; color: #007bff;">← Voltar</a>

        <div id="message"></div>

        <h2>Novo Serviço</h2>
        <form id="formServico">
            <div class="form-group">
                <label>Nome do Serviço</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label>Preço (R$)</label>
                <input type="number" id="preco" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Duração (minutos)</label>
                <input type="number" id="duracao_minutos" value="30" required>
            </div>
            <button type="submit">Adicionar Serviço</button>
        </form>

        <h2>Serviços Cadastrados</h2>
        <table id="tabelaServicos">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Duração (min)</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="servicos"></tbody>
        </table>
    </div>

    <script>
        const basePath = window.location.pathname.includes('/views/')
            ? window.location.pathname.split('/views/')[0]
            : window.location.pathname.replace(/\/[^/]*$/, '');
        const API = `${window.location.origin}${basePath}/api/servico.php`;

        function mostrarMensagem(msg, tipo) {
            const div = document.getElementById('message');
            div.className = `message ${tipo}`;
            div.textContent = msg;
            setTimeout(() => div.textContent = '', 4000);
        }

        function carregarServicos() {
            fetch(API)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('servicos');
                    tbody.innerHTML = '';
                    (data.data || []).forEach(s => {
                        const row = tbody.insertRow();
                        row.innerHTML = `
                            <td>${s.id}</td>
                            <td>${s.nome}</td>
                            <td>R$ ${parseFloat(s.preco).toFixed(2)}</td>
                            <td>${s.duracao_minutos}</td>
                            <td class="actions">
                                <button onclick="editarServico(${s.id}, '${s.nome}', ${s.preco}, ${s.duracao_minutos})">Editar</button>
                                <button class="delete" onclick="deletarServico(${s.id})">Deletar</button>
                            </td>
                        `;
                    });
                });
        }

        function editarServico(id, nome, preco, duracao) {
            document.getElementById('nome').value = nome;
            document.getElementById('preco').value = preco;
            document.getElementById('duracao_minutos').value = duracao;
            document.getElementById('formServico').dataset.id = id;
            document.querySelector('button[type="submit"]').textContent = 'Atualizar Serviço';
        }

        document.getElementById('formServico').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = this.dataset.id;
            const dados = {
                nome: document.getElementById('nome').value,
                preco: document.getElementById('preco').value,
                duracao_minutos: document.getElementById('duracao_minutos').value
            };

            const method = id ? 'PUT' : 'POST';
            if (id) dados.id = id;

            fetch(API, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    mostrarMensagem(data.success, 'success');
                    this.reset();
                    delete this.dataset.id;
                    document.querySelector('button[type="submit"]').textContent = 'Adicionar Serviço';
                    carregarServicos();
                } else {
                    mostrarMensagem(data.error, 'error');
                }
            });
        });

        function deletarServico(id) {
            if (!confirm('Tem certeza que deseja deletar?')) return;
            fetch(API, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            })
            .then(r => r.json())
            .then(data => {
                mostrarMensagem(data.success || data.error, data.success ? 'success' : 'error');
                carregarServicos();
            });
        }

        carregarServicos();
    </script>
</body>
</html>
