<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Agendamentos</title>
    <style>
        :root {
            --primary: #121212;
            --secondary: #d4af37;
            --bg: #121212;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #f4f4f5;
            --muted: #cbd5e1;
            --danger: #dc3545;
            --success: #28a745;
            --info: #0ea5e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.03);
            padding: 24px;
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 18px 60px rgba(0,0,0,0.18);
        }

        h1 {
            color: var(--text);
            margin-top: 0;
        }

        a {
            color: var(--secondary);
            text-decoration: none;
        }

        .filtros {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input, select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
            color: var(--text);
            min-width: 220px;
        }

        input::placeholder, select option {
            color: var(--muted);
        }

        button {
            padding: 10px 20px;
            background: var(--secondary);
            color: var(--primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: opacity 0.2s ease;
        }

        button:hover {
            opacity: 0.92;
        }

        button.export {
            background: var(--success);
            color: white;
        }

        button.cancel {
            background: var(--danger);
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: transparent;
        }

        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        th {
            background: rgba(255,255,255,0.05);
            font-weight: 700;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .message {
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
        }

        .success {
            background: rgba(40, 167, 69, 0.12);
            color: #b7f5cf;
            border: 1px solid rgba(40, 167, 69, 0.35);
        }

        .error {
            background: rgba(220, 53, 69, 0.12);
            color: #ffd7df;
            border: 1px solid rgba(220, 53, 69, 0.35);
        }

        .status {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.85em;
            color: var(--text);
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
        }

        .status.ativo { background: rgba(40,167,69,0.14); }
        .status.cancelado { background: rgba(220,53,69,0.14); }
        .status.concluido { background: rgba(14,165,233,0.14); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Agendamentos</h1>
        <a href="../dashboard.php" style="text-decoration: none; color: #007bff;">← Voltar</a>

        <div id="message"></div>

        <div class="filtros">
            <input type="date" id="filtroData" placeholder="Data">
            <input type="text" id="filtroCliente" placeholder="Nome do cliente">
            <button onclick="filtrar()">Filtrar</button>
            <button class="export" onclick="exportarCSV()">📥 Exportar CSV</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Telefone</th>
                    <th>Data</th>
                    <th>Horário</th>
                    <th>Status</th>
                    <th>Código</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="agendamentos"></tbody>
        </table>
    </div>

    <script>
        const basePath = window.location.pathname.includes('/views/')
            ? window.location.pathname.split('/views/')[0]
            : window.location.pathname.replace(/\/[^/]*$/, '');
        const API = `${window.location.origin}${basePath}/api/agendamento.php`;

        function mostrarMensagem(msg, tipo) {
            const div = document.getElementById('message');
            div.className = `message ${tipo}`;
            div.textContent = msg;
            setTimeout(() => div.textContent = '', 4000);
        }

        function carregarAgendamentos(filters = '') {
            fetch(API + filters)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('agendamentos');
                    tbody.innerHTML = '';
                    (data.data || []).forEach(a => {
                        const row = tbody.insertRow();
                        row.innerHTML = `
                            <td>${a.id}</td>
                            <td>${a.cliente_nome}</td>
                            <td>${a.cliente_telefone}</td>
                            <td>${a.data_agendada}</td>
                            <td>${a.horario}</td>
                            <td><span class="status ${a.status}">${a.status}</span></td>
                            <td>${a.codigo}</td>
                            <td>
                                ${a.status === 'ativo' ? `<button class="cancel" onclick="cancelar('${a.codigo}')">Cancelar</button>` : '-'}
                            </td>
                        `;
                    });
                });
        }

        function filtrar() {
            const data = document.getElementById('filtroData').value;
            const cliente = document.getElementById('filtroCliente').value;
            let url = '?';
            if (data) url += `data=${data}&`;
            if (cliente) url += `cliente=${cliente}&`;
            carregarAgendamentos(url);
        }

        function cancelar(codigo) {
            if (!confirm('Cancelar este agendamento?')) return;
            fetch(API, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codigo: codigo })
            })
            .then(r => r.json())
            .then(data => {
                mostrarMensagem(data.success || data.error, data.success ? 'success' : 'error');
                carregarAgendamentos();
            });
        }

        function exportarCSV() {
            const data = document.getElementById('filtroData').value;
            let url = `${window.location.origin}${basePath}/api/export_agendamentos.php`;
            if (data) url += `?date=${data}`;
            window.location.href = url;
        }

        carregarAgendamentos();
    </script>
</body>
</html>
