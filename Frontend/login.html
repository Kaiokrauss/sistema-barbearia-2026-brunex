        <p class="text-sm text-gray-300 mb-6">Acesse seu painel para gerenciar agendamentos.</p>

        <form class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-300">E-mail ou Telefone</label>
                <input id="email" type="text" placeholder="seu@exemplo.com ou 5511999999999"
                    class="input-focus mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-white outline-none transition duration-200 placeholder:text-gray-500" />
            </div>

            <div class="relative">
                <label for="senha" class="block text-sm font-medium text-gray-300">Senha</label>
                <input id="senha" type="password" placeholder="********"
                    class="input-focus mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 pr-12 text-white outline-none transition duration-200 placeholder:text-gray-500" />
                <button type="button" onclick="togglePassword()"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-yellow-300 focus:outline-none">
                    <span id="eyeIcon">👁️</span>
                </button>
            </div>

            <button type="submit"
                class="w-full rounded-2xl bg-[#D4AF37] px-4 py-3 text-sm font-semibold text-black transition hover:bg-[#E1B12C]">
                Entrar
            </button>

            <div class="flex items-center justify-between text-sm text-yellow-300">
                <a href="#" class="hover:text-white">Esqueceu a senha?</a>
                <a href="#" class="hover:text-white">Criar conta</a>
            </div>
        </form>
    </div>

    <script>
        function togglePassword() {
            const senhaInput = document.getElementById('senha');
            const eyeIcon = document.getElementById('eyeIcon');
            const type = senhaInput.type === 'password' ? 'text' : 'password';
            senhaInput.type = type;
            eyeIcon.textContent = type === 'password' ? '👁️' : '🙈';
        }
    </script>
