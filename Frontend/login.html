<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Borcelle Barbearia</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-card {
            background: rgba(22, 22, 22, 0.88);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.35);
        }
        .tab-button {
            padding-bottom: 0.75rem;
            font-size: 0.95rem;
            font-weight: 700;
            color: rgba(226, 232, 240, 0.85);
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab-button.active {
            color: white;
            border-color: #D4AF37;
        }
        .link-muted {
            color: #D4AF37;
        }
        .link-muted:hover {
            color: #fff;
        }
        .input-focus:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.12);
        }
    </style>
</head>

                <p class="text-sm uppercase tracking-[0.3em] text-yellow-300">Borcelle Barbearia</p>
                <h1 class="mt-2 text-3xl font-semibold text-white">Bem-vindo de volta</h1>

        <!-- Abas -->
        <div class="flex gap-2 mb-6 border-b border-white/10">
            <button onclick="showLogin()" id="tabLogin" class="flex-1 tab-button active cursor-pointer">
                Entrar
            </button>
            <button onclick="showRegister()" id="tabRegister" class="flex-1 tab-button cursor-pointer">
                Criar Conta
            </button>
        </div>
        <div id="alertBox" class="mb-6 hidden rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white"></div>

        <!-- LOGIN -->
        <form id="loginSection" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-300">E-mail ou Telefone</label>
                <input id="email" type="text" placeholder="seu@exemplo.com ou 5511999999999"
                    class="input-focus mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-white outline-none transition duration-200 placeholder:text-gray-500" />
            </div>

            <div class="relative">
                <label for="senha" class="block text-sm font-medium text-gray-300">Senha</label>
                <input id="senha" type="password" placeholder="********"
                    class="input-focus mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 pr-12 text-white outline-none transition duration-200 placeholder:text-gray-500" />
                <button type="button" onclick="togglePass('senha', 'eye1')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-yellow-300 focus:outline-none">
                    <span id="eye1">👁️</span>
                </button>
            </div>

            <button type="submit" class="w-full rounded-2xl bg-[#D4AF37] px-4 py-3 text-sm font-semibold text-black transition hover:bg-[#E1B12C]">
                Entrar
            </button>

            <div class="text-sm">
                <a href="#" class="link-muted hover:text-white">Esqueceu a senha?</a>
            </div>
        </form>

        <!-- REGISTRO -->
        <form id="registerSection" class="space-y-6" style="display:none;">
            <div>
                <label for="nome" class="block text-sm font-medium text-gray-300">Nome Completo</label>
                <input id="nome" type="text" placeholder="Seu nome completo"
                    class="input-focus mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-white outline-none transition duration-200 placeholder:text-gray-500" />
            </div>

            <div>
                <label for="emailReg" class="block text-sm font-medium text-gray-300">E-mail</label>
                <input id="emailReg" type="email" placeholder="seu@exemplo.com"
                    class="input-focus mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-white outline-none transition duration-200 placeholder:text-gray-500" />
            </div>

            <div>
                <label for="telefone" class="block text-sm font-medium text-gray-300">Telefone</label>
                <input id="telefone" type="tel" placeholder="5511999999999"
                    class="input-focus mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-white outline-none transition duration-200 placeholder:text-gray-500" />
            </div>

            <div class="relative">
                <label for="senhaReg" class="block text-sm font-medium text-gray-300">Senha</label>
                <input id="senhaReg" type="password" placeholder="Mínimo 8 caracteres"
                    class="input-focus mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 pr-12 text-white outline-none transition duration-200 placeholder:text-gray-500" />
                <button type="button" onclick="togglePass('senhaReg', 'eye2')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-yellow-300 focus:outline-none">
                    <span id="eye2">👁️</span>
                </button>
            </div>

            <div class="relative">
                <label for="senhaReg2" class="block text-sm font-medium text-gray-300">Confirmar Senha</label>
                <input id="senhaReg2" type="password" placeholder="Confirme sua senha"
                    class="input-focus mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 pr-12 text-white outline-none transition duration-200 placeholder:text-gray-500" />
                <button type="button" onclick="togglePass('senhaReg2', 'eye3')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-yellow-300 focus:outline-none">
                    <span id="eye3">👁️</span>
                </button>
            </div>

            <button type="submit" class="w-full rounded-2xl bg-[#D4AF37] px-4 py-3 text-sm font-semibold text-black transition hover:bg-[#E1B12C]">
                Criar Conta
            </button>
        </form>
    </div>

    <script>
        const alertBox = document.getElementById('alertBox');
        const loginForm = document.getElementById('loginSection');
        const registerForm = document.getElementById('registerSection');

        function showAlert(message, type = 'success') {
            alertBox.textContent = message;
            alertBox.classList.remove('hidden', 'bg-red-500/20', 'text-red-200', 'bg-green-500/20', 'text-green-200');
            if (type === 'error') {
                alertBox.classList.add('bg-red-500/20', 'text-red-200');
            } else {
                alertBox.classList.add('bg-green-500/20', 'text-green-200');
            }
        }

        function hideAlert() {
            alertBox.classList.add('hidden');
        }

        function togglePass(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            if (input.type === 'password') {
                input.type = 'text';
                eye.textContent = '🙈';
            } else {
                input.type = 'password';
                eye.textContent = '👁️';
            }
        }

        function showLogin() {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabRegister').classList.remove('active');
            hideAlert();
        }

        function showRegister() {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('tabRegister').classList.add('active');
            hideAlert();
        }

        registerForm.addEventListener('submit', async function (event) {
            event.preventDefault();
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('emailReg').value.trim().toLowerCase();
            const telefone = document.getElementById('telefone').value.trim();
            const senha = document.getElementById('senhaReg').value;
            const senha2 = document.getElementById('senhaReg2').value;

            const response = await fetch('../api/register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ nome, email, telefone, senha, senha2 })
            });
            const data = await response.json();

            if (!response.ok) {
                showAlert(data.error || 'Erro no cadastro.', 'error');
                return;
            }

            showAlert(data.success || 'Cadastro realizado com sucesso.');
            showLogin();
            registerForm.reset();
        });

        loginForm.addEventListener('submit', async function (event) {
            event.preventDefault();
            const identifier = document.getElementById('email').value.trim().toLowerCase();
            const senha = document.getElementById('senha').value;

            const response = await fetch('../api/login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ identifier, senha })
            });
            const data = await response.json();

            if (!response.ok) {
                showAlert(data.error || 'Erro no login.', 'error');
                return;
            }

            showAlert(data.success || 'Login realizado com sucesso.');
            loginForm.reset();
            window.location.href = 'dashboard.php';
        });

        window.addEventListener('load', showLogin);
    </script>
</body>
</html>
